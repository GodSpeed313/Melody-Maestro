kind = "web"
previewPath = "/"
title = "The Architect"
version = "1.0.0"
id = "artifacts/the-architect"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 5000

[services.development]
run = "cd /home/runner/workspace && streamlit run main.py --server.port 5000 --server.address 0.0.0.0"

[services.env]
PORT = "5000"

[services.production]

[services.production.run]
args = ["bash", "-c", "cd /home/runner/workspace && streamlit run main.py --server.port 5000 --server.address 0.0.0.0"]

[services.production.run.env]
PORT = "5000"
